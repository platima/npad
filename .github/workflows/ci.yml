name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Release

jobs:
  lint:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v4
    
    - name: Check dependencies
      run: |
        echo "Checking for required tools..."
        which cppcheck || echo "cppcheck not found"
        which clang-format || echo "clang-format not found"
        which x86_64-w64-mingw32-gcc || echo "mingw64 not found"
    
    - name: Run cppcheck
      run: |
        cppcheck --enable=all --std=c99 --platform=win32A \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          --error-exitcode=1 \
          src/
    
    - name: Check code formatting
      run: |
        find src/ -name "*.c" -o -name "*.h" | xargs clang-format --dry-run --Werror

  build-windows:
    runs-on: self-hosted
    needs: lint
    steps:
    - uses: actions/checkout@v4
    
    - name: Check cross-compiler
      run: |
        echo "Checking MinGW cross-compiler..."
        which x86_64-w64-mingw32-gcc || echo "x64 mingw not found"
    
    - name: Build Windows x64
      run: |
        make clean
        CC=x86_64-w64-mingw32-gcc make windows
    
    - name: Upload Windows x64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: npad-windows-x64
        path: npad.exe

  build-linux:
    runs-on: self-hosted
    needs: lint
    steps:
    - uses: actions/checkout@v4
    
    - name: Check build tools
      run: |
        echo "Checking build tools..."
        which gcc || echo "gcc not found"
        ls /usr/include/X11/Xlib.h || echo "X11 headers not found"
    
    - name: Build Linux
      run: |
        make clean
        make linux
    
    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: npad-linux-x64
        path: npad

  test:
    runs-on: self-hosted
    needs: [build-windows, build-linux]
    steps:
    - uses: actions/checkout@v4
    
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/
    
    - name: Test Windows build (basic checks)
      run: |
        # Basic file checks for Windows build
        file artifacts/npad-windows-x64/npad.exe || echo "file command not available"
        
        # Check that executable exists and has reasonable size
        test -f artifacts/npad-windows-x64/npad.exe
        
        # Size checks (should be at least 50KB, less than 5MB)
        size_x64=$(stat -c%s artifacts/npad-windows-x64/npad.exe)
        
        test $size_x64 -gt 50000
        test $size_x64 -lt 5000000
        
        echo "Windows build passed basic checks"
    
    - name: Test Linux build
      run: |
        # Basic file checks for Linux build
        file artifacts/npad-linux-x64/npad || echo "file command not available"
        test -x artifacts/npad-linux-x64/npad
        
        # Size checks
        size_linux=$(stat -c%s artifacts/npad-linux-x64/npad)
        test $size_linux -gt 50000
        test $size_linux -lt 5000000
        
        # Test help output (should exit cleanly)
        artifacts/npad-linux-x64/npad --help || test $? -eq 0
        
        echo "Linux build passed basic checks"