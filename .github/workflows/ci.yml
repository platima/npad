name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Required so release.yml can run this workflow as its validation gate
  workflow_call:

env:
  BUILD_TYPE: Release

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Install dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -y -q cppcheck clang-format
    
    # Use the canonical Makefile targets so CI and local runs always agree
    # (a hand-rolled cppcheck invocation here once drifted: it lacked
    # --inline-suppr, so the source's inline suppressions were ignored)
    - name: Run cppcheck
      run: make lint

    - name: Check code formatting
      run: make format-check

  build-windows:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v7

    - name: Install dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -y -q build-essential gcc-mingw-w64-x86-64
    
    - name: Build Windows variants
      run: |
        make clean
        make windows
    
    - name: Verify Windows builds exist and generate checksums
      run: |
        echo "Verifying Windows builds were created..."
        ls -la npad.exe npad-terminal.exe
        echo "Windows GUI size: $(stat -c%s npad.exe) bytes"
        echo "Windows Terminal size: $(stat -c%s npad-terminal.exe) bytes"
        
        echo "Generating checksums..."
        sha256sum npad.exe > npad.exe.sha256
        sha256sum npad-terminal.exe > npad-terminal.exe.sha256
        
        echo "Windows GUI SHA256: $(cat npad.exe.sha256)"
        echo "Windows Terminal SHA256: $(cat npad-terminal.exe.sha256)"
    
    - name: Upload Windows GUI artifact
      uses: actions/upload-artifact@v7
      with:
        name: npad-windows-gui-x64
        path: |
          npad.exe
          npad.exe.sha256
        retention-days: 7
    
    - name: Upload Windows Terminal artifact
      uses: actions/upload-artifact@v7
      with:
        name: npad-windows-terminal-x64
        path: |
          npad-terminal.exe
          npad-terminal.exe.sha256
        retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v7

    - name: Install dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -y -q build-essential libx11-dev libwayland-dev libncurses-dev
    
    - name: Build Linux variants
      run: |
        make clean
        make linux
    
    - name: Verify Linux builds exist and generate checksums
      run: |
        echo "Verifying Linux builds were created..."
        ls -la npad-linux-x11 npad-linux-wayland npad-linux-terminal
        echo "Linux X11 size: $(stat -c%s npad-linux-x11) bytes"
        echo "Linux Wayland size: $(stat -c%s npad-linux-wayland) bytes"
        echo "Linux Terminal size: $(stat -c%s npad-linux-terminal) bytes"
        
        echo "Generating checksums..."
        sha256sum npad-linux-x11 > npad-linux-x11.sha256
        sha256sum npad-linux-wayland > npad-linux-wayland.sha256
        sha256sum npad-linux-terminal > npad-linux-terminal.sha256
        
        echo "Linux X11 SHA256: $(cat npad-linux-x11.sha256)"
        echo "Linux Wayland SHA256: $(cat npad-linux-wayland.sha256)"
        echo "Linux Terminal SHA256: $(cat npad-linux-terminal.sha256)"
    
    - name: Upload Linux X11 artifact
      uses: actions/upload-artifact@v7
      with:
        name: npad-linux-x11-x64
        path: |
          npad-linux-x11
          npad-linux-x11.sha256
        retention-days: 7
    
    - name: Upload Linux Wayland artifact
      uses: actions/upload-artifact@v7
      with:
        name: npad-linux-wayland-x64
        path: |
          npad-linux-wayland
          npad-linux-wayland.sha256
        retention-days: 7
    
    - name: Upload Linux Terminal artifact
      uses: actions/upload-artifact@v7
      with:
        name: npad-linux-terminal-x64
        path: |
          npad-linux-terminal
          npad-linux-terminal.sha256
        retention-days: 7

  test:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    steps:
    - uses: actions/checkout@v7

    - name: Install dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -y -q build-essential

    - name: Run unit tests
      run: |
        make test

    - name: Download artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts/
    
    - name: List downloaded artifacts
      run: |
        echo "Downloaded artifacts structure:"
        find artifacts/ -type f -exec ls -la {} \;
    
    - name: Verify checksums and test Windows builds
      run: |
        echo "=== Verifying Windows GUI Build ==="
        if [ ! -f "artifacts/npad-windows-gui-x64/npad.exe" ]; then
          echo "ERROR: Windows GUI executable not found"
          exit 1
        fi
        
        # Verify checksum
        if [ -f "artifacts/npad-windows-gui-x64/npad.exe.sha256" ]; then
          echo "Verifying Windows GUI checksum..."
          cd artifacts/npad-windows-gui-x64/
          if sha256sum -c npad.exe.sha256; then
            echo "✓ Windows GUI checksum verified"
          else
            echo "ERROR: Windows GUI checksum verification failed"
            exit 1
          fi
          cd ../..
        else
          echo "WARNING: Windows GUI checksum file not found"
        fi
        
        file artifacts/npad-windows-gui-x64/npad.exe || echo "file command not available"
        
        size_gui=$(stat -c%s artifacts/npad-windows-gui-x64/npad.exe)
        echo "Windows GUI size: $size_gui bytes"
        
        if [ "$size_gui" -le 40000 ]; then
          echo "ERROR: Windows GUI build too small ($size_gui bytes, expected > 40000)"
          exit 1
        fi
        
        if [ "$size_gui" -ge 5000000 ]; then
          echo "ERROR: Windows GUI build too large ($size_gui bytes, expected < 5000000)"
          exit 1
        fi
        
        echo "=== Verifying Windows Terminal Build ==="
        if [ ! -f "artifacts/npad-windows-terminal-x64/npad-terminal.exe" ]; then
          echo "ERROR: Windows Terminal executable not found"
          exit 1
        fi
        
        # Verify checksum
        if [ -f "artifacts/npad-windows-terminal-x64/npad-terminal.exe.sha256" ]; then
          echo "Verifying Windows Terminal checksum..."
          cd artifacts/npad-windows-terminal-x64/
          if sha256sum -c npad-terminal.exe.sha256; then
            echo "✓ Windows Terminal checksum verified"
          else
            echo "ERROR: Windows Terminal checksum verification failed"
            exit 1
          fi
          cd ../..
        else
          echo "WARNING: Windows Terminal checksum file not found"
        fi
        
        file artifacts/npad-windows-terminal-x64/npad-terminal.exe || echo "file command not available"
        
        size_terminal=$(stat -c%s artifacts/npad-windows-terminal-x64/npad-terminal.exe)
        echo "Windows Terminal size: $size_terminal bytes"
        
        if [ "$size_terminal" -le 40000 ]; then
          echo "ERROR: Windows Terminal build too small ($size_terminal bytes, expected > 40000)"
          exit 1
        fi
        
        if [ "$size_terminal" -ge 5000000 ]; then
          echo "ERROR: Windows Terminal build too large ($size_terminal bytes, expected < 5000000)"
          exit 1
        fi
        
        echo "✓ Windows builds passed all checks"
    
    - name: Verify checksums and test Linux builds
      run: |
        echo "=== Restoring execute permissions ==="
        chmod +x artifacts/npad-linux-x11-x64/npad-linux-x11
        chmod +x artifacts/npad-linux-wayland-x64/npad-linux-wayland
        chmod +x artifacts/npad-linux-terminal-x64/npad-linux-terminal
        
        echo "=== Verifying Linux X11 Build ==="
        if [ ! -f "artifacts/npad-linux-x11-x64/npad-linux-x11" ]; then
          echo "ERROR: Linux X11 executable not found"
          exit 1
        fi
        
        # Verify checksum
        if [ -f "artifacts/npad-linux-x11-x64/npad-linux-x11.sha256" ]; then
          echo "Verifying Linux X11 checksum..."
          cd artifacts/npad-linux-x11-x64/
          if sha256sum -c npad-linux-x11.sha256; then
            echo "✓ Linux X11 checksum verified"
          else
            echo "ERROR: Linux X11 checksum verification failed"
            exit 1
          fi
          cd ../..
        else
          echo "WARNING: Linux X11 checksum file not found"
        fi
        
        file artifacts/npad-linux-x11-x64/npad-linux-x11 || echo "file command not available"
        
        if [ ! -x "artifacts/npad-linux-x11-x64/npad-linux-x11" ]; then
          echo "ERROR: Linux X11 executable is not executable"
          exit 1
        fi
        
        size_x11=$(stat -c%s artifacts/npad-linux-x11-x64/npad-linux-x11)
        echo "Linux X11 size: $size_x11 bytes"
        
        if [ "$size_x11" -le 20000 ]; then
          echo "ERROR: Linux X11 build too small ($size_x11 bytes, expected > 20000)"
          exit 1
        fi
        
        if [ "$size_x11" -ge 5000000 ]; then
          echo "ERROR: Linux X11 build too large ($size_x11 bytes, expected < 5000000)"
          exit 1
        fi
        
        echo "=== Verifying Linux Wayland Build ==="
        if [ ! -f "artifacts/npad-linux-wayland-x64/npad-linux-wayland" ]; then
          echo "ERROR: Linux Wayland executable not found"
          exit 1
        fi
        
        # Verify checksum
        if [ -f "artifacts/npad-linux-wayland-x64/npad-linux-wayland.sha256" ]; then
          echo "Verifying Linux Wayland checksum..."
          cd artifacts/npad-linux-wayland-x64/
          if sha256sum -c npad-linux-wayland.sha256; then
            echo "✓ Linux Wayland checksum verified"
          else
            echo "ERROR: Linux Wayland checksum verification failed"
            exit 1
          fi
          cd ../..
        else
          echo "WARNING: Linux Wayland checksum file not found"
        fi
        
        file artifacts/npad-linux-wayland-x64/npad-linux-wayland || echo "file command not available"
        
        if [ ! -x "artifacts/npad-linux-wayland-x64/npad-linux-wayland" ]; then
          echo "ERROR: Linux Wayland executable is not executable"
          exit 1
        fi
        
        size_wayland=$(stat -c%s artifacts/npad-linux-wayland-x64/npad-linux-wayland)
        echo "Linux Wayland size: $size_wayland bytes"
        
        if [ "$size_wayland" -le 20000 ]; then
          echo "ERROR: Linux Wayland build too small ($size_wayland bytes, expected > 20000)"
          exit 1
        fi
        
        if [ "$size_wayland" -ge 5000000 ]; then
          echo "ERROR: Linux Wayland build too large ($size_wayland bytes, expected < 5000000)"
          exit 1
        fi
        
        echo "=== Verifying Linux Terminal Build ==="
        if [ ! -f "artifacts/npad-linux-terminal-x64/npad-linux-terminal" ]; then
          echo "ERROR: Linux Terminal executable not found"
          exit 1
        fi
        
        # Verify checksum
        if [ -f "artifacts/npad-linux-terminal-x64/npad-linux-terminal.sha256" ]; then
          echo "Verifying Linux Terminal checksum..."
          cd artifacts/npad-linux-terminal-x64/
          if sha256sum -c npad-linux-terminal.sha256; then
            echo "✓ Linux Terminal checksum verified"
          else
            echo "ERROR: Linux Terminal checksum verification failed"
            exit 1
          fi
          cd ../..
        else
          echo "WARNING: Linux Terminal checksum file not found"
        fi
        
        file artifacts/npad-linux-terminal-x64/npad-linux-terminal || echo "file command not available"
        
        if [ ! -x "artifacts/npad-linux-terminal-x64/npad-linux-terminal" ]; then
          echo "ERROR: Linux Terminal executable is not executable"
          exit 1
        fi
        
        size_terminal=$(stat -c%s artifacts/npad-linux-terminal-x64/npad-linux-terminal)
        echo "Linux Terminal size: $size_terminal bytes"
        
        if [ "$size_terminal" -le 15000 ]; then
          echo "ERROR: Linux Terminal build too small ($size_terminal bytes, expected > 15000)"
          exit 1
        fi
        
        if [ "$size_terminal" -ge 5000000 ]; then
          echo "ERROR: Linux Terminal build too large ($size_terminal bytes, expected < 5000000)"
          exit 1
        fi
        
        echo "✓ Linux builds passed all checks"
    
    - name: Test executable functionality
      run: |
        echo "=== Testing executable functionality ==="
        
        echo "Testing version output for Linux X11 build..."
        if ! timeout 10s artifacts/npad-linux-x11-x64/npad-linux-x11 --version; then
          exit_code=$?
          echo "ERROR: Version command failed with exit code $exit_code"
          exit 1
        fi
        
        echo "Testing help output for Linux X11 build..."
        if ! timeout 10s artifacts/npad-linux-x11-x64/npad-linux-x11 --help; then
          exit_code=$?
          echo "ERROR: Help command failed with exit code $exit_code"
          exit 1
        fi
        
        echo "✓ Version and help commands executed successfully"
        echo "✓ All tests passed!"

  # Create a release job that runs on tags and integrates with the separate release workflow
  release:
    runs-on: ubuntu-latest
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: release-artifacts/
    
    - name: Create checksums summary
      run: |
        cd release-artifacts
        
        # Create a master checksums file for CI artifacts
        echo "# npad CI Build Checksums - $(date -u)" > CI-CHECKSUMS.txt
        echo "# Generated on: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> CI-CHECKSUMS.txt
        echo "# Build commit: ${GITHUB_SHA}" >> CI-CHECKSUMS.txt
        echo "# Tag: ${GITHUB_REF#refs/tags/}" >> CI-CHECKSUMS.txt
        echo "" >> CI-CHECKSUMS.txt
        
        # Collect all individual checksum files
        find . -name "*.sha256" -exec cat {} \; >> CI-CHECKSUMS.txt
        
        echo "" >> CI-CHECKSUMS.txt
        echo "# These are CI build artifacts. For official releases, use the release workflow." >> CI-CHECKSUMS.txt
        
        cat CI-CHECKSUMS.txt
    
    - name: Upload CI build bundle
      uses: actions/upload-artifact@v7
      with:
        name: npad-ci-build-bundle
        path: release-artifacts/
        retention-days: 90  # Keep longer for tagged builds