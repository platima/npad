name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Release

jobs:
  lint:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v4
    
    - name: Check dependencies
      run: |
        echo "Checking for required tools..."
        which cppcheck || echo "cppcheck not found"
        which clang-format || echo "clang-format not found"
        which x86_64-w64-mingw32-gcc || echo "mingw64 not found"
    
    - name: Run cppcheck
      run: |
        cppcheck --enable=all --std=c99 --platform=win32A \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          --error-exitcode=1 \
          src/
    
    - name: Check code formatting
      run: |
        find src/ -name "*.c" -o -name "*.h" | xargs clang-format --dry-run --Werror

  build-windows:
    runs-on: self-hosted
    needs: lint
    steps:
    - uses: actions/checkout@v4
    
    - name: Check cross-compiler
      run: |
        echo "Checking MinGW cross-compiler..."
        which x86_64-w64-mingw32-gcc || echo "x64 mingw not found"
    
    - name: Build Windows variants
      run: |
        make clean
        make windows
    
    - name: Upload Windows GUI artifact
      uses: actions/upload-artifact@v4
      with:
        name: npad-windows-gui-x64
        path: npad.exe
    
    - name: Upload Windows Terminal artifact
      uses: actions/upload-artifact@v4
      with:
        name: npad-windows-terminal-x64
        path: npad-win32-terminal.exe

  build-linux:
    runs-on: self-hosted
    needs: lint
    steps:
    - uses: actions/checkout@v4
    
    - name: Check build tools
      run: |
        echo "Checking build tools..."
        which gcc || echo "gcc not found"
        ls /usr/include/X11/Xlib.h || echo "X11 headers not found"
    
    - name: Build Linux variants
      run: |
        make clean
        make linux
    
    - name: Upload Linux X11 artifact
      uses: actions/upload-artifact@v4
      with:
        name: npad-linux-x11-x64
        path: npad-linux-x11
    
    - name: Upload Linux Wayland artifact
      uses: actions/upload-artifact@v4
      with:
        name: npad-linux-wayland-x64
        path: npad-linux-wayland
    
    - name: Upload Linux Terminal artifact
      uses: actions/upload-artifact@v4
      with:
        name: npad-linux-terminal-x64
        path: npad-linux-terminal

  test:
    runs-on: self-hosted
    needs: [build-windows, build-linux]
    steps:
    - uses: actions/checkout@v4
    
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/
    
    - name: Test Windows builds (basic checks)
      run: |
        echo "Basic file checks for Windows GUI build"
        file artifacts/npad-windows-gui-x64/npad.exe || echo "file command not available"
        test -f artifacts/npad-windows-gui-x64/npad.exe
        
        echo "Size checks for GUI (should be at least 50KB, less than 5MB)"
        size_gui=$(stat -c%s artifacts/npad-windows-gui-x64/npad.exe)
        test $size_gui -gt 50000
        test $size_gui -lt 5000000
        
        echo "Basic file checks for Windows Terminal build"
        file artifacts/npad-windows-terminal-x64/npad-win32-terminal.exe || echo "file command not available"
        test -f artifacts/npad-windows-terminal-x64/npad-win32-terminal.exe
        
        echo "Size checks for Terminal"
        size_terminal=$(stat -c%s artifacts/npad-windows-terminal-x64/npad-win32-terminal.exe)
        test $size_terminal -gt 50000
        test $size_terminal -lt 5000000
        
        echo "Windows builds passed basic checks"
    
    - name: Test Linux builds
      run: |
        echo "Restore execute permissions (lost during artifact upload/download)"
        chmod +x artifacts/npad-linux-x11-x64/npad-linux-x11
        chmod +x artifacts/npad-linux-wayland-x64/npad-linux-wayland
        chmod +x artifacts/npad-linux-terminal-x64/npad-linux-terminal
        
        echo "Test Linux X11 build"
        file artifacts/npad-linux-x11-x64/npad-linux-x11 || echo "file command not available"
        test -x artifacts/npad-linux-x11-x64/npad-linux-x11
        size_x11=$(stat -c%s artifacts/npad-linux-x11-x64/npad-linux-x11)
        test $size_x11 -gt 30000
        test $size_x11 -lt 5000000
        
        echo "Test Linux Wayland build"
        file artifacts/npad-linux-wayland-x64/npad-linux-wayland || echo "file command not available"
        test -x artifacts/npad-linux-wayland-x64/npad-linux-wayland
        size_wayland=$(stat -c%s artifacts/npad-linux-wayland-x64/npad-linux-wayland)
        test $size_wayland -gt 30000
        test $size_wayland -lt 5000000
        
        echo "Test Linux Terminal build"
        file artifacts/npad-linux-terminal-x64/npad-linux-terminal || echo "file command not available"
        test -x artifacts/npad-linux-terminal-x64/npad-linux-terminal
        size_terminal=$(stat -c%s artifacts/npad-linux-terminal-x64/npad-linux-terminal)
        test $size_terminal -gt 30000
        test $size_terminal -lt 5000000
        
        echo "Test help output for one of the builds (should exit cleanly)"
        echo "Testing help output..."
        artifacts/npad-linux-x11-x64/npad-linux-x11 --help
        if [ $? -ne 0 ]; then
            echo "Help command failed with exit code $?"
            exit 1
        fi
        
        echo "Linux builds passed basic checks"