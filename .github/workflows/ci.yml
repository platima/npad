name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Release

jobs:
  lint:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cppcheck clang-format-14 gcc-mingw-w64
    
    - name: Run cppcheck
      run: |
        cppcheck --enable=all --std=c99 --platform=win32A \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          --error-exitcode=1 \
          src/
    
    - name: Check code formatting
      run: |
        find src/ -name "*.c" -o -name "*.h" | xargs clang-format-14 --dry-run --Werror

  build-windows:
    runs-on: self-hosted
    needs: lint
    steps:
    - uses: actions/checkout@v4
    
    - name: Install MinGW cross-compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-mingw-w64-x86-64 gcc-mingw-w64-i686
    
    - name: Build Windows x64
      run: |
        make clean
        CC=x86_64-w64-mingw32-gcc make windows
        mv npad.exe npad-x64.exe
    
    - name: Build Windows x86
      run: |
        make clean
        CC=i686-w64-mingw32-gcc make windows
        mv npad.exe npad-x86.exe
    
    - name: Upload Windows x64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: npad-windows-x64
        path: npad-x64.exe
    
    - name: Upload Windows x86 artifact
      uses: actions/upload-artifact@v4
      with:
        name: npad-windows-x86
        path: npad-x86.exe

  build-linux:
    runs-on: self-hosted
    needs: lint
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libx11-dev
    
    - name: Build Linux
      run: |
        make clean
        make linux
    
    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: npad-linux-x64
        path: npad

  test:
    runs-on: self-hosted
    needs: [build-windows, build-linux]
    steps:
    - uses: actions/checkout@v4
    
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/
    
    - name: Test Windows build (basic checks)
      run: |
        # Basic file checks for Windows builds
        file artifacts/npad-windows-x64/npad-x64.exe
        file artifacts/npad-windows-x86/npad-x86.exe
        
        # Check that executables exist and have reasonable size
        test -f artifacts/npad-windows-x64/npad-x64.exe
        test -f artifacts/npad-windows-x86/npad-x86.exe
        
        # Size checks (should be at least 50KB, less than 5MB)
        size_x64=$(stat -c%s artifacts/npad-windows-x64/npad-x64.exe)
        size_x86=$(stat -c%s artifacts/npad-windows-x86/npad-x86.exe)
        
        test $size_x64 -gt 50000
        test $size_x64 -lt 5000000
        test $size_x86 -gt 50000
        test $size_x86 -lt 5000000
    
    - name: Test Linux build
      run: |
        # Basic file checks for Linux build
        file artifacts/npad-linux-x64/npad
        test -x artifacts/npad-linux-x64/npad
        
        # Size checks
        size_linux=$(stat -c%s artifacts/npad-linux-x64/npad)
        test $size_linux -gt 50000
        test $size_linux -lt 5000000
        
        # Test help output (should exit cleanly)
        artifacts/npad-linux-x64/npad --help || test $? -eq 0