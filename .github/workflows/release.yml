name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0, v2.1.3, etc.

# Creating the release and uploading assets needs write access; the default
# GITHUB_TOKEN is read-only
permissions:
  contents: write

env:
  BUILD_TYPE: Release

jobs:
  # Run the main CI workflow first to ensure quality
  ci-validation:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  create-release:
    runs-on: ubuntu-latest
    needs: ci-validation
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
    - name: Get version from tag
      id: get_version
      run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref }}
        name: npad ${{ steps.get_version.outputs.version }}
        body: |
          ## npad ${{ steps.get_version.outputs.version }}
          
          🎉 **New Release Available!**
          
          ### Downloads
          
          **Windows Builds:**
          - `npad-setup-${{ steps.get_version.outputs.version }}.exe` - Windows installer (per-user by default; system-wide available)
          - `npad-${{ steps.get_version.outputs.version }}.msi` - Windows MSI for silent/managed deployment (`msiexec /i ... /qn`)
          - `npad-${{ steps.get_version.outputs.version }}-windows-gui.exe` - Portable GUI version for Windows (no install needed)
          - `npad-${{ steps.get_version.outputs.version }}-windows-terminal.exe` - Terminal version for Windows
          
          **Linux Builds:**
          - `npad-${{ steps.get_version.outputs.version }}-linux-x11` - X11/Xorg version for Linux
          - `npad-${{ steps.get_version.outputs.version }}-linux-wayland` - Wayland version for Linux  
          - `npad-${{ steps.get_version.outputs.version }}-linux-terminal` - Terminal version for Linux
          
          **Verification:**
          - `CHECKSUMS.txt` - SHA256 checksums for all files
          - Verify with: `sha256sum -c CHECKSUMS.txt` (Linux/macOS) or `Get-FileHash` (Windows)
          
          ### Installation
          1. Download the appropriate file for your system from the Assets below
          2. **Windows**: Run `npad-setup-*.exe` to install (or `msiexec /i npad-*.msi /qn` for silent), or run the portable exe directly
          3. **Linux**: Make executable with `chmod +x filename` and run
          4. **Verification**: Check the file integrity using the provided checksums
          
          ### Changes
          See the [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for detailed changes in this release.
          
          ---
          
          **Build Info:**
          - Commit: `${{ github.sha }}`
          - Built: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - [CI Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
        draft: false
        prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}
        generate_release_notes: true

  build-and-upload:
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-gui
            cc: x86_64-w64-mingw32-gcc
            make_target: windows
            output: npad.exe
            asset_name: npad-${{ needs.create-release.outputs.version }}-windows-gui.exe
          - target: windows-terminal
            cc: x86_64-w64-mingw32-gcc  
            make_target: windows
            output: npad-terminal.exe
            asset_name: npad-${{ needs.create-release.outputs.version }}-windows-terminal.exe
          - target: linux-x11
            cc: gcc
            make_target: linux
            output: npad-linux-x11
            asset_name: npad-${{ needs.create-release.outputs.version }}-linux-x11
          - target: linux-wayland
            cc: gcc
            make_target: linux
            output: npad-linux-wayland
            asset_name: npad-${{ needs.create-release.outputs.version }}-linux-wayland
          - target: linux-terminal
            cc: gcc
            make_target: linux
            output: npad-linux-terminal
            asset_name: npad-${{ needs.create-release.outputs.version }}-linux-terminal

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -y -q build-essential gcc-mingw-w64-x86-64 \
          libx11-dev libwayland-dev libncurses-dev
    
    - name: Build and validate ${{ matrix.target }}
      run: |
        make clean
        CC=${{ matrix.cc }} make ${{ matrix.make_target }}
        
        # Verify the build output exists
        if [ ! -f "${{ matrix.output }}" ]; then
          echo "ERROR: Expected output file ${{ matrix.output }} not found"
          ls -la
          exit 1
        fi
        
        echo "Build successful: ${{ matrix.output }}"
        ls -la ${{ matrix.output }}
        
        # Test version output (Linux builds only, Windows cross-compiled can't run)
        if [[ "${{ matrix.target }}" == linux-* ]]; then
          echo "Testing version output..."
          if timeout 10s ./${{ matrix.output }} --version; then
            echo "✓ Version command successful"
          else
            echo "ERROR: Version command failed"
            exit 1
          fi
          
          # Extract version for validation if this is a tagged release
          version_output=$(timeout 10s ./${{ matrix.output }} --version | head -1)
          echo "Version output: $version_output"
          
          # Validate version matches tag (if we have a tag)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag_version="${GITHUB_REF#refs/tags/}"
            if [[ "$version_output" == *"$tag_version"* ]]; then
              echo "✓ Version matches release tag: $tag_version"
            else
              echo "WARNING: Version output doesn't contain tag $tag_version"
              echo "Version: $version_output"
              echo "Tag: $tag_version"
              # Don't fail here as version might be different format
            fi
          fi
        fi
        
        # Strip debugging symbols for release (if Linux)
        if [[ "${{ matrix.target }}" == linux-* ]]; then
          strip ${{ matrix.output }}
          echo "Stripped debug symbols from ${{ matrix.output }}"
        fi
        
        # Rename to versioned filename
        mv ${{ matrix.output }} ${{ matrix.asset_name }}
        
        # Generate checksum
        sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
        
        echo "Final asset: ${{ matrix.asset_name }}"
        echo "Size: $(stat -c%s ${{ matrix.asset_name }}) bytes"
        echo "SHA256: $(cat ${{ matrix.asset_name }}.sha256)"
    
    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ needs.create-release.outputs.version }}
        files: |
          ${{ matrix.asset_name }}
          ${{ matrix.asset_name }}.sha256

  build-installers:
    needs: create-release
    uses: ./.github/workflows/installers.yml
    with:
      release_tag: ${{ needs.create-release.outputs.version }}
    secrets: inherit
    permissions:
      contents: write

  validate-release:
    runs-on: ubuntu-latest
    needs: [create-release, build-and-upload]
    steps:
    - name: Download and validate release assets
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Get release information
        release_id=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
          "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ needs.create-release.outputs.version }}" \
          | jq -r '.id')
        
        echo "=== Validating Release Assets ==="
        echo "Release ID: $release_id"
        echo "Version: ${{ needs.create-release.outputs.version }}"
        
        # Download and test Linux executables for version validation
        mkdir -p validation
        cd validation
        
        # Download Linux X11 build for testing
        linux_x11_url=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
          "https://api.github.com/repos/${{ github.repository }}/releases/$release_id/assets" \
          | jq -r '.[] | select(.name | contains("linux-x11") and (endswith(".exe") == false)) | .browser_download_url')
        
        if [ -n "$linux_x11_url" ]; then
          echo "Downloading Linux X11 build for validation..."
          curl -L -s "$linux_x11_url" -o npad-linux-x11-test
          chmod +x npad-linux-x11-test
          
          echo "Testing version output..."
          if timeout 10s ./npad-linux-x11-test --version; then
            version_output=$(timeout 10s ./npad-linux-x11-test --version | head -1)
            echo "✓ Version command successful: $version_output"
            
            # Check if version output contains the tag
            tag_version="${{ needs.create-release.outputs.version }}"
            if [[ "$version_output" == *"$tag_version"* ]]; then
              echo "✓ Version matches release tag: $tag_version"
            else
              echo "ℹ️  Version format: $version_output"
              echo "ℹ️  Release tag: $tag_version"
              echo "ℹ️  Note: Version format may differ from tag format"
            fi
          else
            echo "ERROR: Version command failed for release build"
            exit 1
          fi
          
          echo "Testing help output..."
          if timeout 10s ./npad-linux-x11-test --help >/dev/null 2>&1; then
            echo "✓ Help command successful"
          else
            echo "ERROR: Help command failed for release build"
            exit 1
          fi
        else
          echo "WARNING: Could not find Linux X11 build for validation"
        fi
        
        echo "✓ Release validation completed"

  create-checksums:
    runs-on: ubuntu-latest
    needs: [create-release, build-and-upload, build-installers, validate-release]
    steps:
    - uses: actions/checkout@v4
    
    - name: Download release assets to create master checksum
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Get all release assets
        release_id=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
          "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ needs.create-release.outputs.version }}" \
          | jq -r '.id')
        
        echo "Release ID: $release_id"
        
        # Download all .sha256 files
        curl -s -H "Authorization: token $GITHUB_TOKEN" \
          "https://api.github.com/repos/${{ github.repository }}/releases/$release_id/assets" \
          | jq -r '.[] | select(.name | endswith(".sha256")) | .browser_download_url' \
          | while read url; do
            echo "Downloading checksum: $url"
            curl -L -s "$url" >> temp_checksums.txt
          done
    
    - name: Create master CHECKSUMS.txt
      run: |
        echo "# npad Release Checksums - ${{ needs.create-release.outputs.version }}" > CHECKSUMS.txt
        echo "# Generated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> CHECKSUMS.txt
        echo "# Release: https://github.com/${{ github.repository }}/releases/tag/${{ needs.create-release.outputs.version }}" >> CHECKSUMS.txt
        echo "# Commit: ${{ github.sha }}" >> CHECKSUMS.txt
        echo "" >> CHECKSUMS.txt
        
        # Add all checksums
        if [ -f temp_checksums.txt ]; then
          cat temp_checksums.txt >> CHECKSUMS.txt
        fi
        
        echo "" >> CHECKSUMS.txt
        echo "# Verification Instructions:" >> CHECKSUMS.txt
        echo "# Linux/macOS: sha256sum -c CHECKSUMS.txt" >> CHECKSUMS.txt
        echo "# Windows PowerShell: Get-FileHash -Algorithm SHA256 <filename>" >> CHECKSUMS.txt
        echo "# Windows Command Prompt: certutil -hashfile <filename> SHA256" >> CHECKSUMS.txt
        
        echo "Master checksums file created:"
        cat CHECKSUMS.txt
    
    - name: Upload master checksums
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ needs.create-release.outputs.version }}
        files: CHECKSUMS.txt

  update-release-notes:
    runs-on: ubuntu-latest
    needs: [create-release, build-and-upload, validate-release, create-checksums]
    steps:
    - name: Update release with final info
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ needs.create-release.outputs.version }}
        body: |
          ## npad ${{ needs.create-release.outputs.version }}
          
          🎉 **New Release Available!**
          
          ### Downloads
          
          **Windows Builds:**
          - `npad-setup-${{ needs.create-release.outputs.version }}.exe` - Windows installer (per-user by default; system-wide available)
          - `npad-${{ needs.create-release.outputs.version }}.msi` - Windows MSI for silent/managed deployment (`msiexec /i ... /qn`)
          - `npad-${{ needs.create-release.outputs.version }}-windows-gui.exe` - Portable GUI version for Windows (no install needed)
          - `npad-${{ needs.create-release.outputs.version }}-windows-terminal.exe` - Terminal version for Windows
          
          **Linux Builds:**
          - `npad-${{ needs.create-release.outputs.version }}-linux-x11` - X11/Xorg version for Linux
          - `npad-${{ needs.create-release.outputs.version }}-linux-wayland` - Wayland version for Linux  
          - `npad-${{ needs.create-release.outputs.version }}-linux-terminal` - Terminal version for Linux
          
          **Verification:**
          - `CHECKSUMS.txt` - SHA256 checksums for all files
          - Individual `.sha256` files for each binary
          - Verify with: `sha256sum -c CHECKSUMS.txt` (Linux/macOS) or `Get-FileHash` (Windows)
          
          ### Installation
          1. Download the appropriate file for your system from the Assets below
          2. **Windows**: Run `npad-setup-*.exe` to install (or `msiexec /i npad-*.msi /qn` for silent), or run the portable exe directly
          3. **Linux**: Make executable with `chmod +x filename` and run
          4. **Verification**: Check the file integrity using the provided checksums
          
          ### Changes
          See the [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for detailed changes in this release.
          
          ---
          
          **Build Info:**
          - Commit: `${{ github.sha }}`
          - Built: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - [CI Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - All builds passed CI validation before release