name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0, v2.1.3, etc.

env:
  BUILD_TYPE: Release

jobs:
  create-release:
    runs-on: self-hosted
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
    - name: Get version from tag
      id: get_version
      run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: npad ${{ steps.get_version.outputs.version }}
        body: |
          ## npad ${{ steps.get_version.outputs.version }}
          
          🎉 **New Release Available!**
          
          ### Downloads
          - **Windows x64**: `npad-${{ steps.get_version.outputs.version }}-windows-x64.exe` - Recommended for most users
          - **Windows x86**: `npad-${{ steps.get_version.outputs.version }}-windows-x86.exe` - For 32-bit systems
          - **Linux x64**: `npad-${{ steps.get_version.outputs.version }}-linux-x64` - For Linux distributions
          
          ### Installation
          1. Download the appropriate file for your system
          2. **Windows**: Run the executable directly (portable) or place in your PATH
          3. **Linux**: Make executable with `chmod +x` and run
          
          ### Changes
          See the [commit history](https://github.com/platima/npad/commits/${{ github.ref }}) for detailed changes in this release.
          
          ---
          
          **Note**: This follows [Semantic Versioning](https://semver.org/) - check the version number for compatibility information.
        draft: false
        prerelease: false

  build-and-upload:
    runs-on: self-hosted
    needs: create-release
    strategy:
      matrix:
        include:
          - target: windows-x64
            cc: x86_64-w64-mingw32-gcc
            make_target: windows
            output: npad.exe
            asset_name: npad-${{ needs.create-release.outputs.version }}-windows-x64.exe
          - target: windows-x86
            cc: i686-w64-mingw32-gcc
            make_target: windows
            output: npad.exe
            asset_name: npad-${{ needs.create-release.outputs.version }}-windows-x86.exe
          - target: linux-x64
            cc: gcc
            make_target: linux
            output: npad
            asset_name: npad-${{ needs.create-release.outputs.version }}-linux-x64

    steps:
    - uses: actions/checkout@v4
    
    - name: Check dependencies
      run: |
        echo "Checking for required tools..."
        which cppcheck || echo "WARNING: cppcheck not found"
        which x86_64-w64-mingw32-gcc || echo "WARNING: mingw64 not found"
        which i686-w64-mingw32-gcc || echo "WARNING: mingw32 not found"
        which gcc || echo "WARNING: gcc not found"
    
    - name: Run linting
      run: |
        cppcheck --enable=all --std=c99 --platform=win32A \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          --error-exitcode=1 \
          src/
    
    - name: Build ${{ matrix.target }}
      run: |
        make clean
        CC=${{ matrix.cc }} make ${{ matrix.make_target }}
        
        # Verify the build output exists
        test -f ${{ matrix.output }}
        
        # Strip debugging symbols for release (if not Windows)
        if [[ "${{ matrix.target }}" != *"windows"* ]]; then
          strip ${{ matrix.output }}
        fi
        
        # Rename to versioned filename
        mv ${{ matrix.output }} ${{ matrix.asset_name }}
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./${{ matrix.asset_name }}
        asset_name: ${{ matrix.asset_name }}
        asset_content_type: application/octet-stream

  update-latest-release:
    runs-on: self-hosted
    needs: [create-release, build-and-upload]
    steps:
    - name: Update latest release badge
      run: |
        echo "Release ${{ needs.create-release.outputs.version }} completed successfully"
        # This step can be extended to update any external services or badges